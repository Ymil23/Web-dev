<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault: Secret Macaroni</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: rgb(104, 6, 104);
      text-align: center;
      color: #f4f4f4;
      line-height: 1.8;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
    }

    h1 {
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    form {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;

      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 200px;
      margin-bottom: 20px;
    }

    input[type="submit"] {
      padding: 10px 25px;
      border-radius: 5px;
      border: none;
      background-color: #ffcc00;
      color: #680668;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    input[type="submit"]:hover {
      background-color: #ffe066;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>Secrets</h1>

  <form action="/check" method="POST">
    <label for="password">Enter Access Code:</label>
    <input type="text" id="password" name="password" required>
    <br>
    <input type="submit" value="Submit">
  </form>
  
</body>
</html>
